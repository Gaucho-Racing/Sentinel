name: sentinel

services:
  kerbecs:
    container_name: sentinel-kerbecs
    image: bk1031/kerbecs:latest
    restart: always
    ports:
      - "10310:10310"
      - "10300:10300"
    volumes:
      - ./kerbecs.yaml:/etc/kerbecs/kerbecs.yaml:ro
    environment:
      KERBECS_CONFIG: /etc/kerbecs/kerbecs.yaml
    depends_on:
      - core
      - oauth
      - discord
      - web

  rincon:
    container_name: sentinel-rincon
    image: bk1031/rincon:latest
    restart: always
    ports:
      - "10311:10311"
    depends_on:
      - db
    environment:
      STORAGE_MODE: sql
      DB_DRIVER: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: sentinel

  core:
    container_name: sentinel-core
    image: golang:1.26-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "go install github.com/air-verse/air@latest && air"
    volumes:
      - ./core:/app
      - core_gopath:/go
    depends_on:
      - db
      - rincon
    environment:
      ENV: DEV
      PORT: 9999
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_NAME: sentinel
      RINCON_ENDPOINT: http://rincon:10311
      RINCON_USER: admin
      RINCON_PASSWORD: admin
      SERVICE_ENDPOINT: http://core:9999
      SERVICE_HEALTH_CHECK: http://core:9999/core/ping

  discord:
    container_name: sentinel-discord
    image: golang:1.26-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "go install github.com/air-verse/air@latest && air"
    volumes:
      - ./discord:/app
      - discord_gopath:/go
    depends_on:
      - db
      - rincon
    environment:
      ENV: DEV
      PORT: 9998
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_NAME: sentinel
      RINCON_ENDPOINT: http://rincon:10311
      RINCON_USER: admin
      RINCON_PASSWORD: admin
      SERVICE_ENDPOINT: http://discord:9998
      SERVICE_HEALTH_CHECK: http://discord:9998/discord/ping
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD: ${DISCORD_GUILD}
      DISCORD_PREFIX: d!

  oauth:
    container_name: sentinel-oauth
    image: golang:1.26-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "go install github.com/air-verse/air@latest && air"
    volumes:
      - ./oauth:/app
      - oauth_gopath:/go
    depends_on:
      - db
      - rincon
    environment:
      ENV: DEV
      PORT: 9997
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_NAME: sentinel
      RINCON_ENDPOINT: http://rincon:10311
      RINCON_USER: admin
      RINCON_PASSWORD: admin
      SERVICE_ENDPOINT: http://oauth:9997
      SERVICE_HEALTH_CHECK: http://oauth:9997/oauth/ping

  web:
    container_name: sentinel-web
    image: node:22-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:10310

  db:
    container_name: sentinel-db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
  core_gopath:
  discord_gopath:
  oauth_gopath:
  web_node_modules:
