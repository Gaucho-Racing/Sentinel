name: sentinel

services:
  kerbecs:
    container_name: sentinel-kerbecs
    image: bk1031/kerbecs:latest
    restart: always
    ports:
      - "10310:10310"
      - "10300:10300"
    volumes:
      - ./kerbecs.yaml:/etc/kerbecs/kerbecs.yaml:ro
    environment:
      KERBECS_CONFIG: /etc/kerbecs/kerbecs.yaml
    depends_on:
      - core
      - oauth
      - discord
      - web

  core:
    container_name: sentinel-core
    image: golang:1.26-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "go install github.com/air-verse/air@latest && air"
    volumes:
      - ./core:/app
      - core_gopath:/go
    depends_on:
      - db
    environment:
      ENV: DEV
      PORT: 9999
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: sentinel
      ISSUER: ${ISSUER:-http://localhost:10310}

  discord:
    container_name: sentinel-discord
    image: golang:1.26-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "go install github.com/air-verse/air@latest && air"
    volumes:
      - ./discord:/app
      - discord_gopath:/go
    depends_on:
      - db
    environment:
      ENV: DEV
      PORT: 9998
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: sentinel
      KERBECS_ENDPOINT: http://kerbecs:10300
      KERBECS_USER: admin
      KERBECS_PASSWORD: admin
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD: ${DISCORD_GUILD}
      DISCORD_PREFIX: d!
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:10310}

  oauth:
    container_name: sentinel-oauth
    image: golang:1.26-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "go install github.com/air-verse/air@latest && air"
    volumes:
      - ./oauth:/app
      - oauth_gopath:/go
    depends_on:
      - db
    environment:
      ENV: DEV
      PORT: 9997
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: sentinel
      KERBECS_ENDPOINT: http://kerbecs:10300
      KERBECS_USER: admin
      KERBECS_PASSWORD: admin
      ISSUER: ${ISSUER:-http://localhost:10310}

  web:
    container_name: sentinel-web
    image: node:22-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:10310

  db:
    container_name: sentinel-db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sentinel
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
  core_gopath:
  discord_gopath:
  oauth_gopath:
  web_node_modules:
