gateway:
  name: sentinel-gateway
  version: 0.1.0
  env: ${ENV:DEV}
  timeouts:
    dial: 5s
    headers: 30s
    idle: 50s
    overall: 0

listeners:
  gateway:
    port: "10310"
    cors:
      enabled: true
      allowed_origins: ["*"]
      allow_credentials: false
  admin:
    port: "10300"
    auth:
      type: basic
      username: ${KERBECS_USER:admin}
      password: ${KERBECS_PASSWORD:admin}

providers:
  static:
    watch: false

upstreams:
  core:
    name: sentinel-core
    version: 0.1.0
    instances:
      - http://core:9999

  oauth:
    name: sentinel-oauth
    version: 0.1.0
    instances:
      - http://oauth:9997

  discord:
    name: sentinel-discord
    version: 0.1.0
    instances:
      - http://discord:9998

  saml:
    name: sentinel-saml
    version: 0.1.0
    instances:
      - http://saml:9996

  web:
    name: sentinel-web
    version: 0.1.0
    instances:
      - http://web:5173

routes:
  - name: core-internal
    match:
      path: /api/core/*
    upstream: core
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  - name: core-users
    match:
      path: /api/users/*
    upstream: core
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  - name: core-applications
    match:
      path: /api/applications/*
    upstream: core
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  - name: core-groups
    match:
      path: /api/groups/*
    upstream: core
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  - name: core-entities
    match:
      path: /api/entities/*
    upstream: core
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  - name: oauth
    match:
      path: /api/oauth/*
    upstream: oauth
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  - name: auth
    match:
      path: /api/auth/*
    upstream: oauth
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  - name: discord
    match:
      path: /api/discord/*
    upstream: discord
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  # SAML consent endpoints — the SPA calls these through the /api prefix.
  - name: saml
    match:
      path: /api/saml/*
    upstream: saml
    rewrite:
      strip_prefix: /api
    envelope: passthrough

  # OIDC discovery must live at the issuer root (no /api prefix), so route it
  # straight to oauth without stripping anything.
  - name: well-known
    match:
      path: /.well-known/*
    upstream: oauth
    envelope: passthrough

  # SAML IdP metadata and SSO endpoint live at the issuer root (no /api prefix)
  # so the URLs published in metadata are clean and stable. The SPA-served
  # /saml/authorize consent page is NOT listed here, so it falls through to the
  # web frontend below.
  - name: saml-metadata
    match:
      path: /saml/metadata
    upstream: saml
    envelope: passthrough

  - name: saml-sso
    match:
      path: /saml/sso
    upstream: saml
    envelope: passthrough

  - name: web-frontend
    match:
      path: /*
    upstream: web
    envelope: passthrough
